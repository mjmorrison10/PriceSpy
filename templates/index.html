<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceSpy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔎</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root,[data-theme=dark]{--bg:#0f1117;--s:#1a1d27;--s2:#22252f;--b:#2a2d38;--t:#e8eaed;--t2:#9aa0a6;--a:#5b8def;--g:#34d399;--r:#f87171;--am:#fbbf24;--p:#a78bfa;--rad:12px;--rs:8px}
[data-theme=light]{--bg:#f5f5f7;--s:#fff;--s2:#f0f0f3;--b:#dcdce0;--t:#1c1c1e;--t2:#6c6c74;--a:#2563eb;--g:#059669;--r:#dc2626;--am:#d97706;--p:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;line-height:1.5}
header{background:var(--s);border-bottom:1px solid var(--b);padding:10px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--a),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hr{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pil{padding:5px 12px;background:var(--s2);border:1px solid var(--b);border-radius:16px;color:var(--t2);font-size:.75rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.pil:hover{color:var(--t);border-color:var(--t2)}.pil.ac{background:var(--a);color:#fff;border-color:var(--a)}
main{max-width:1200px;margin:0 auto;padding:24px 20px 80px}
.cd{background:var(--s);border:1px solid var(--b);border-radius:var(--rad);padding:24px;margin-bottom:20px}
.cd h2,.cd h3{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.sb{color:var(--t2);font-size:.85rem;margin-bottom:16px}.rw{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
input[type=text],input[type=number],input[type=email],input[type=password],select{padding:10px 14px;background:var(--bg);border:1.5px solid var(--b);border-radius:var(--rs);color:var(--t);font-size:.9rem;outline:none;width:100%}input:focus,select:focus{border-color:var(--a)}select option{background:var(--s);color:var(--t)}
.bt{padding:10px 18px;border-radius:var(--rs);font-size:.85rem;font-weight:600;cursor:pointer;border:none}.bt-p{background:var(--a);color:#fff}.bt-g{background:0 0;color:var(--t2);border:1px solid var(--b)}
.gd{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:var(--rad);padding:14px 18px}.sc .lb{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}.sc .vl{font-size:1.3rem;font-weight:700;margin-bottom:2px}.sc .vl.g{color:var(--g)}.sc .vl.r{color:var(--r)}.sc .vl.am{color:var(--am)}.sc .sm{font-size:.7rem;color:var(--t2)}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:16px;font-size:.75rem;font-weight:600;text-transform:uppercase}.bdg.ri{background:rgba(52,211,153,.15);color:var(--g)}.bdg.fa{background:rgba(248,113,113,.15);color:var(--r)}.bdg.st{background:rgba(251,191,36,.15);color:var(--am)}
.tpl{display:flex;gap:3px;margin-bottom:14px;flex-wrap:wrap}.tp{padding:5px 12px;background:var(--s2);border:1px solid var(--b);border-radius:16px;color:var(--t2);font-size:.75rem;cursor:pointer}.tp.sl{background:var(--a);color:#fff;border-color:var(--a)}
.cw{position:relative;width:100%;height:300px;margin-top:12px}.cw canvas{width:100%!important;height:100%!important}
.spn{display:none;width:18px;height:18px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:sp .6s linear infinite}.spn.on{display:inline-block}@keyframes sp{to{transform:rotate(360deg)}}
.er{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:var(--rs);padding:12px 16px;color:var(--r);font-size:.85rem;margin-bottom:14px;display:none}.er.on{display:block}
.rs{display:none}.rs.on{display:block}.pg{display:none}.pg.on{display:block}
.ft{text-align:center;padding:20px;color:var(--t2);font-size:.8rem;line-height:1.6;border-top:1px solid var(--b);margin-top:30px;opacity:.8}
@media(max-width:768px){main{padding:16px 10px 60px}.gd{grid-template-columns:1fr 1fr}.cw{height:240px}}
</style>
</head>
<body>
<header><span style="font-size:1.5rem">🔎</span><span class="logo">PriceSpy</span>
<div class="hr">
<button class="pil ac" id="navSearch">Search</button>
<button class="pil" id="navWatch">⭐ Watch</button>
<button class="pil" id="navDeals">📋 Deals</button>
<button class="pil" id="athBtn">Login</button>
<button class="pil" id="thmBtn">🌙</button>
</div></header>

<main>
<div id="pg-search" style="display:block">
<div class="cd"><h2>What's it worth?</h2><div class="sb">Search any item for real eBay prices, market trends, and flipping analysis.</div>
<div class="rw">
<input type="text" id="q" placeholder='Try "Nintendo Switch OLED" or "iPhone 15 Pro"...' style="flex:1">
<button class="bt bt-p" id="qb">Search</button>
</div>
<div class="rw" style="margin-top:10px">
<select id="cond" style="width:160px"><option value="all">All Conditions</option></select>
<div style="position:relative;width:100px"><span style="position:absolute;left:8px;top:10px;color:var(--t2);font-size:.8rem">$</span><input type="number" id="bp" placeholder="Buy" step="0.01" min="0" style="padding-left:18px"></div>
<select id="plat" style="width:130px"><option value="ebay">eBay (13.25%)</option><option value="mercari">Mercari (10%)</option><option value="poshmark">Poshmark (20%)</option><option value="facebook">FB (5%)</option><option value="local">Local (0%)</option></select>
<div style="position:relative;width:85px"><span style="position:absolute;left:6px;top:10px;color:var(--t2);font-size:.8rem">$</span><input type="number" id="ship" placeholder="Ship" step="0.01" min="0" style="padding-left:16px"></div>
<button class="bt bt-p" id="go">Search</button>
</div></div>
<div style="display:flex;align-items:center;gap:8px;min-height:20px;margin-bottom:12px"><span class="spn" id="sp"></span><span id="st" style="font-size:.8rem;color:var(--t2)"></span></div>
<div class="er" id="em"></div>
<div class="rs" id="res">
<div class="gd" id="sum"></div>
<div style="margin-bottom:14px" id="dr"></div>
<div class="tpl" id="tpls"></div>
<div class="cd"><h3 id="ct">Price Trend</h3><div class="cw"><canvas id="chart"></canvas></div></div>
<div class="cd" id="condCard" style="display:none"><h3>Price by Condition</h3><div id="ctabs" style="display:flex;gap:0;margin-bottom:8px;border-bottom:2px solid var(--b);overflow-x:auto"></div><div id="ctps"></div></div>
<div class="cd" id="satCard" style="display:none"></div>
<div class="cd" id="flipc"></div>
<div id="soldl" style="margin-bottom:24px"></div>
<div id="activel"></div>
</div></div>

<div id="pg-watch" style="display:none" class="pg"><div class="cd"><h2>Watchlist</h2><button class="bt bt-p" id="wref" style="margin-bottom:10px">Refresh All</button><div id="wl"></div></div></div>
<div id="pg-deals" style="display:none" class="pg"><div class="cd"><h2>Deal History</h2><div id="dh"></div></div></div>

<div id="authOv" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center" class="ov">
<div style="background:var(--s);border:1px solid var(--b);border-radius:var(--rad);padding:22px;max-width:420px;width:90%">
<h3 id="authT">Login</h3>
<input type="email" id="ae" placeholder="Email" style="margin-bottom:8px"><input type="password" id="ap" placeholder="Password" style="margin-bottom:8px">
<input type="text" id="an" placeholder="Display name" style="display:none;margin-bottom:8px">
<div class="er" id="aerr" style="margin-bottom:8px"></div>
<div class="rw"><button class="bt bt-p" id="asub" style="flex:1">Login</button><button class="bt bt-g" id="atog">Create</button></div>
<button class="bt bt-g" style="width:100%;margin-top:6px" id="authCancel">Cancel</button>
</div></div>
</main>
<div class="ft"><div class="vt" id="vt"></div><div class="vr" id="vr"></div></div>

<script>
/* ====== HELPERS ====== */
var $ = function(id){ return document.getElementById(id); };
var fmt = function(n){ return (n||0).toFixed? Number(n).toFixed(2) : '0.00'; };
/* NOTE: do NOT use E() or innerHTML string-building with complex ternary expressions.
   Instead, create DOM elements directly to avoid unmatched parentheses bugs. */
var _div = function(cn, html){ var d=document.createElement('div'); if(cn)d.className=cn; if(html)d.innerHTML=html; return d; };
var _span = function(cn, txt){ var s=document.createElement('span'); if(cn)s.className=cn; if(txt)s.textContent=txt; return s; };

/* ====== STATE ====== */
var chart = null;
var data = null;
var period = '6m';
var token = '';
var user = null;
var isReg = false;
var PERIODS = ['1w','1m','3m','6m','1y','2y','3y','5y','10y'];
var COND_LABELS = {all:'All Conditions','new (sealed)':'New Sealed','new':'New','like new':'Like New','cib':'CIB','very good':'Very Good','good':'Good','acceptable':'Acceptable','loose':'Loose','untested':'Untested','for parts':'For Parts','excellent':'Excellent','fair':'Fair','poor':'Poor'};
function CL(c){ return COND_LABELS[c] || c || 'Unknown'; }

/* ====== THEME ====== */
if(localStorage.getItem('ps-thm') === 'light'){ document.documentElement.setAttribute('data-theme','light'); $('thmBtn').textContent = '☀️'; }
$('thmBtn').onclick = function(){
  var n = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', n);
  $('thmBtn').textContent = n === 'light' ? '☀️' : '🌙';
  localStorage.setItem('ps-thm', n);
};

/* ====== BIBLE ====== */
var VRS = [
  {t:'"For I know well the plans I have in mind for you, plans for your welfare, not for your disaster, plans to give you a future filled with hope."', r:'Jeremiah 29:11'},
  {t:'"I can do all things through him who strengthens me."', r:'Philippians 4:13'},
  {t:'"The Lord is my shepherd; there is nothing I shall lack."', r:'Psalm 23:1'},
  {t:'"Be strong and courageous. Do not be afraid."', r:'Deuteronomy 31:6'},
  {t:'"Come to me, all you who labor and are burdened."', r:'Matthew 11:28'},
  {t:'"Rejoice in the Lord always."', r:'Philippians 4:4'},
  {t:'"For God so loved the world that he gave his only Son."', r:'John 3:16'},
  {t:'"Trust in the Lord with all your heart."', r:'Proverbs 3:5'},
  {t:'"The steadfast love of the Lord never ceases."', r:'Lamentations 3:22'},
  {t:'"Behold, I am with you always, even to the end of the age."', r:'Matthew 28:20'},
  {t:'"Let your light shine before men."', r:'Matthew 5:16'},
  {t:'"Blessed are the peacemakers, for they will be called children of God."', r:'Matthew 5:9'},
  {t:'"The Lord bless you and keep you; the Lord make his face shine upon you."', r:'Numbers 6:24-25'},
  {t:'"Do not be anxious about anything, but in everything by prayer and supplication with thanksgiving let your requests be made known to God."', r:'Philippians 4:6'},
  {t:'"I am the way, and the truth, and the life."', r:'John 14:6'},
  {t:'"Seek first the kingdom of God and his righteousness, and all these things will be given to you as well."', r:'Matthew 6:33'},
  {t:'"The Lord is my light and my salvation; whom shall I fear?"', r:'Psalm 27:1'},
  {t:'"Be still and know that I am God."', r:'Psalm 46:11'},
  {t:'"This is the day that the Lord has made; let us rejoice and be glad in it."', r:'Psalm 118:24'},
  {t:'"We know that all things work together for good for those who love God."', r:'Romans 8:28'},
  {t:'"The Lord is near to the brokenhearted and saves those who are crushed in spirit."', r:'Psalm 34:18'},
  {t:'"For where your treasure is, there also will your heart be."', r:'Matthew 6:21'},
  {t:'"You shall love the Lord your God with all your heart, with all your soul, and with all your mind."', r:'Matthew 22:37'},
  {t:'"Let nothing disturb you, let nothing frighten you. All things pass. God never changes."', r:'St. Teresa of Avila'}
];
function setVerse(){
  var v = VRS[new Date().getHours() % VRS.length];
  $('vt').textContent = v.t;
  $('vr').textContent = '\u2014 ' + v.r;
}
setVerse();
setInterval(setVerse, 3600000);

/* ====== AUTH ====== */
try { token = localStorage.getItem('ps-tk') || ''; user = JSON.parse(localStorage.getItem('ps-usr') || 'null'); } catch(e) {}
if (user) { $('athBtn').textContent = user.display_name || user.email; }
$('athBtn').onclick = function(){ $('authOv').style.display = 'flex'; };
$('authCancel').onclick = function(){ $('authOv').style.display = 'none'; };
$('atog').onclick = function(){
  isReg = !isReg;
  $('authT').textContent = isReg ? 'Create Account' : 'Login';
  $('asub').textContent = isReg ? 'Create' : 'Login';
  $('an').style.display = isReg ? 'block' : 'none';
  $('aerr').style.display = 'none';
};
$('asub').onclick = async function(){
  var e = $('ae').value.trim(), p = $('ap').value.trim(), n = $('an').value.trim();
  if (!e || !p) { $('aerr').textContent = 'Email and password required'; $('aerr').style.display = 'block'; return; }
  try {
    var ep = isReg ? '/api/auth/register' : '/api/auth/login';
    var b = isReg ? {email:e, password:p, display_name:n || e.split('@')[0]} : {email:e, password:p};
    var r = await fetch(ep, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
    var d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    token = d.token; user = d.user;
    localStorage.setItem('ps-tk', token); localStorage.setItem('ps-usr', JSON.stringify(user));
    $('authOv').style.display = 'none'; $('athBtn').textContent = user.display_name || user.email;
  } catch(err) { $('aerr').textContent = err.message; $('aerr').style.display = 'block'; }
};

/* ====== NAVIGATION ====== */
var pages = ['search','watch','deals'];
function showPage(p){
  for (var i = 0; i < pages.length; i++) {
    var pg = $('pg-' + pages[i]);
    if (pg) pg.style.display = (pages[i] === p) ? 'block' : 'none';
  }
  $('navSearch').classList.toggle('ac', p === 'search');
  $('navWatch').classList.toggle('ac', p === 'watch');
  $('navDeals').classList.toggle('ac', p === 'deals');
  if (p === 'watch') loadWatchlist();
  if (p === 'deals') loadDeals();
}
$('navSearch').onclick = function(){ showPage('search'); };
$('navWatch').onclick = function(){ showPage('watch'); };
$('navDeals').onclick = function(){ showPage('deals'); };

/* ====== CONDITION DROPDOWN ====== */
function setConds(avail, labels){
  if (!avail || !avail.length) return;
  if (labels) { for (var k in labels) { COND_LABELS[k] = labels[k]; } }
  var curr = $('cond').value;
  var sel = $('cond');
  sel.innerHTML = '';
  var opt = document.createElement('option');
  opt.value = 'all'; opt.textContent = 'All Conditions';
  sel.appendChild(opt);
  for (var i = 0; i < avail.length; i++) {
    var c = avail[i];
    if (c === 'all') continue;
    opt = document.createElement('option');
    opt.value = c; opt.textContent = CL(c);
    sel.appendChild(opt);
  }
  sel.value = curr;
}

/* ====== TIME PILLS ====== */
function buildTimePills(){
  var container = $('tpls');
  container.innerHTML = '';
  for (var i = 0; i < PERIODS.length; i++) {
    var p = PERIODS[i];
    var pill = document.createElement('span');
    pill.className = 'tp' + (p === period ? ' sl' : '');
    pill.textContent = p.toUpperCase();
    pill.dataset.p = p;
    pill.onclick = function(){ period = this.dataset.p; buildTimePills(); search(); };
    container.appendChild(pill);
  }
}
buildTimePills();

/* ====== SEARCH ====== */
function ld(o){ $('sp').classList.toggle('on', o); $('st').textContent = o ? 'Searching...' : ''; }
function er(m){ $('em').textContent = m; $('em').style.display = 'block'; }
function ce(){ $('em').style.display = 'none'; }

async function search(filterCond){
  var q = $('q').value.trim();
  if (!q) return;
  ld(true); ce(); $('res').classList.remove('on');
  var c = filterCond || $('cond').value || 'all';
  var bp = parseFloat($('bp').value) || 0;
  var pl = $('plat').value || 'ebay';
  var sh = parseFloat($('ship').value) || 0;
  var u = '/api/search?q=' + encodeURIComponent(q) + '&period=' + period + '&condition=' + encodeURIComponent(c);
  if (bp > 0) u += '&buy_price=' + bp.toFixed(2);
  u += '&platform=' + pl;
  if (sh > 0) u += '&shipping=' + sh.toFixed(2);
  try {
    var r = await fetch(u);
    data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Search failed');
    if (!data.sold_summary || !data.sold_summary.count) { er('No results for "' + q + '". Try different keywords.'); ld(false); return; }
    setConds(data.available_conditions, data.condition_labels);
    renderAll(data);
    $('res').classList.add('on');
    $('res').scrollIntoView({behavior:'smooth',block:'start'});
  } catch(err) { er(err.message); }
  finally { ld(false); }
}
$('qb').onclick = function(){ search(); };
$('q').onkeydown = function(e){ if (e.key === 'Enter') search(); };
$('go').onclick = function(){ search(); };

/* ====== RENDER ALL (using DOM creation, NO innerHTML string concatenation) ====== */
function renderAll(d){
  var s = d.sold_summary, a = d.active_summary, f = d.flip_analysis || {};
  var fc = d.active_filter_condition || '';
  var fltCond = (fc && fc !== 'all') ? ' (' + CL(fc) + ')' : '';

  /* --- Summary Grid --- */
  var sum = $('sum'); sum.innerHTML = '';
  function addStat(label, value, sub, cls){
    var card = _div('sc');
    card.appendChild(_span('lb', label));
    var v = _span('vl', value);
    if (cls) v.classList.add(cls);
    card.appendChild(v);
    if (sub) card.appendChild(_span('sm', sub));
    sum.appendChild(card);
  }
  addStat('Median Sold' + fltCond, '$' + fmt(s.median), s.count + ' sold listings');
  addStat('Sold Range', '$' + fmt(s.low) + ' \u2013 $' + fmt(s.high), 'Avg $' + fmt(s.mean));
  var actCls = (a.median && s.median && a.median < s.median) ? 'g' : (a.median > s.median * 1.05 ? 'am' : '');
  addStat('Active Market', '$' + (a.median ? fmt(a.median) : '--'), a.count + ' active listings', actCls);
  addStat('Market Trend', d.direction === 'rising' ? '\u2191 Rising' : (d.direction === 'falling' ? '\u2193 Falling' : '\u2192 Stable'), d.period.toUpperCase(), d.direction === 'rising' ? 'g' : (d.direction === 'falling' ? 'r' : 'am'));
  var score = f.score || 0;
  var scCls = score >= 70 ? 'g' : (score >= 50 ? '' : (score >= 30 ? 'am' : 'r'));
  addStat('Flip Score', score + '/100', f.verdict || 'N/A', scCls);
  var p = f.potential_profit || 0, pc = f.potential_profit_pct || 0;
  addStat('Net Profit', (p >= 0 ? '+' : '') + '$' + fmt(p), (pc >= 0 ? '+' : '') + pc + '%' + (f.user_buy_price_used ? ' \u00b7 your price' : ''), p >= 0 ? 'g' : 'r');

  /* --- Direction row --- */
  var dir = d.direction;
  $('dr').innerHTML = '<span class="bdg ' + (dir === 'rising' ? 'ri' : (dir === 'falling' ? 'fa' : 'st')) + '">' + (dir === 'rising' ? 'Rising' : (dir === 'falling' ? 'Falling' : 'Stable')) + '</span> <span style="font-size:.7rem;color:var(--t2)">' + (d.data_source || 'Smart Estimate') + '</span>';

  /* --- Chart --- */
  if (chart) { chart.destroy(); chart = null; }
  if (d.trend && d.trend.length > 1) {
    $('ct').textContent = 'Price Trend' + (fc && fc !== 'all' ? ' \u2014 ' + CL(fc) : '');
    var ctx = $('chart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: d.trend.map(function(t){ return t.date; }),
        datasets: [
          {label:'High',data:d.trend.map(function(t){return t.high}),borderColor:'rgba(248,113,113,.4)',backgroundColor:'rgba(248,113,113,.05)',borderWidth:1,pointRadius:0,fill:'+1',tension:.3},
          {label:'Median',data:d.trend.map(function(t){return t.median}),borderColor:'#5b8def',borderWidth:2.5,pointRadius:0,fill:false,tension:.3},
          {label:'Low',data:d.trend.map(function(t){return t.low}),borderColor:'rgba(52,211,153,.4)',borderWidth:1,pointRadius:0,fill:false,tension:.3}
        ]
      },
      options: {responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{position:'top',labels:{color:'#9aa0a6',usePointStyle:true,padding:18,font:{size:11}}}},scales:{x:{ticks:{color:'#888',maxTicksLimit:8,font:{size:10}}},y:{ticks:{color:'#888',font:{size:10},callback:function(v){return'$'+v.toFixed(0)}}}}}
    });
  }

  /* --- Condition Tabs --- */
  var conds = d.available_conditions || [], cs = d.condition_sold || {}, ca = d.condition_active || {};
  if (conds.length > 1) {
    $('condCard').style.display = '';
    var ctabs = $('ctabs'); ctabs.innerHTML = '';
    var ctps = $('ctps'); ctps.innerHTML = '';
    for (var i = 0; i < conds.length; i++) {
      var c = conds[i];
      var tab = document.createElement('button');
      tab.textContent = CL(c);
      tab.style.cssText = 'padding:7px 12px;background:none;border:none;color:var(--t2);font-size:.78rem;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit';
      if (c === fc) { tab.style.color = 'var(--a)'; tab.style.borderBottomColor = 'var(--a)'; }
      tab.onclick = (function(cc){ return function(){ $('cond').value = cc; search(cc); }; })(c);
      ctabs.appendChild(tab);

      /* Panel */
      var panel = _div('ctp');
      if (c === fc) panel.classList.add('ac');
      var sold = cs[c] || {low:0,median:0,high:0,mean:0,count:0};
      var act = ca[c] || {low:0,median:0,high:0,mean:0,count:0};
      var grid = _div('gd');
      grid.style.marginTop = '12px';
      grid.appendChild(_div('sc', '<div class="lb">Sold Median</div><div class="vl">$' + fmt(sold.median) + '</div><div class="sm">' + sold.count + ' sold</div>'));
      grid.appendChild(_div('sc', '<div class="lb">Sold Range</div><div class="vl">$' + fmt(sold.low) + ' \u2013 $' + fmt(sold.high) + '</div><div class="sm">Avg $' + fmt(sold.mean) + '</div>'));
      grid.appendChild(_div('sc', '<div class="lb">Active Median</div><div class="vl">$' + fmt(act.median) + '</div><div class="sm">' + act.count + ' listed</div>'));
      grid.appendChild(_div('sc', '<div class="lb">Potential</div><div class="vl g">$' + fmt(sold.median - sold.low) + '</div><div class="sm">Buy low, sell median</div>'));
      panel.appendChild(grid);
      var filterBtn = document.createElement('button');
      filterBtn.className = 'bt bt-p';
      filterBtn.textContent = 'Show ' + CL(c) + ' Only';
      filterBtn.onclick = (function(cc){ return function(){ $('cond').value = cc; search(cc); }; })(c);
      panel.appendChild(filterBtn);
      ctps.appendChild(panel);
    }
  } else { $('condCard').style.display = 'none'; }

  /* --- Saturation / Opportunity --- */
  var opp = d.opportunity || {}, sat = opp.saturation || {};
  if (opp.score) {
    $('satCard').style.display = '';
    var oc = opp.score >= 70 ? 'gr' : (opp.score >= 50 ? 'ok' : (opp.score >= 30 ? 'wa' : 'no'));
    var rt = sat.active_sold_ratio || 0;
    var rp = Math.min(100, (rt / 10) * 100);
    var rc = rt < 1 ? 'var(--g)' : (rt < 3 ? 'var(--am)' : (rt < 8 ? '#f97316' : 'var(--r)'));
    $('satCard').innerHTML = '<h3>Market Analysis</h3><div style="display:flex;align-items:center;gap:14px;margin-bottom:12px"><span class="fs ' + oc + '">' + opp.score + '</span><div><div style="font-weight:700;font-size:1.1rem">' + (opp.verdict || '') + '</div><div style="font-size:.8rem;color:var(--t2)">' + (opp.description || '') + '</div></div></div><div style="margin-bottom:10px"><div style="font-size:.7rem;color:var(--t2)">Saturation: ' + (sat.label || '') + ' \u2014 ' + (sat.active_count || 0) + ' active / ' + (sat.sold_count || 0) + ' sold</div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:' + rp + '%;background:' + rc + ';border-radius:4px"></div></div></div>';
  } else { $('satCard').style.display = 'none'; }

  /* --- Flip Card --- */
  var fc2 = f.fee_calculation || {};
  if (f.verdict) {
    var fCls = score >= 70 ? 'gr' : (score >= 50 ? 'ok' : (score >= 30 ? 'wa' : 'no'));
    var fh = '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><span class="fs ' + fCls + '">' + score + '</span><div><h3>' + f.verdict + '</h3><div style="font-size:.8rem;color:var(--t2)">' + (f.verdict_detail || '') + '</div></div></div>';
    fh += '<div class="gd">';
    fh += '<div class="sc"><div class="lb">Net Profit</div><div class="vl" style="color:' + (p >= 0 ? 'var(--g)' : 'var(--r)') + '">' + (p >= 0 ? '+' : '') + '$' + fmt(p) + '</div><div class="sm">' + fmt(pc) + '%</div></div>';
    fh += '<div class="sc"><div class="lb">Buy / Sell</div><div class="vl" style="font-size:1rem">$' + fmt(f.potential_buy_price || 0) + ' \u2192 $' + fmt(f.potential_sell_price || 0) + '</div></div>';
    fh += '<div class="sc"><div class="lb">Sell-Through</div><div class="vl">' + fmt(f.sell_through_rate || 0) + '%</div></div>';
    fh += '<div class="sc"><div class="lb">Velocity</div><div class="vl" style="font-size:1rem">' + (f.velocity_label || 'N/A') + '</div><div class="sm">' + fmt(f.velocity_per_day || 0) + '/day</div></div>';
    fh += '<div class="sc"><div class="lb">Competition</div><div class="vl" style="color:' + ((f.competition_level || 0) < 30 ? 'var(--g)' : ((f.competition_level || 0) < 60 ? '' : 'var(--r)')) + '">' + (f.competition_level || 0) + '%</div></div>';
    fh += '<div class="sc"><div class="lb">Risk</div><div class="vl" style="color:' + ((f.risk_level || '') === 'Low' ? 'var(--g)' : ((f.risk_level || '') === 'High' ? 'var(--r)' : 'var(--am)')) + '">' + (f.risk_level || 'N/A') + '</div></div>';
    fh += '</div>';
    if (fc2.platform) {
      fh += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--b);font-size:.78rem;color:var(--t2)">' + fc2.platform + ': $' + fmt(fc2.platform_fee) + ' + $' + fmt(fc2.payment_fee) + ' + $' + fmt(fc2.shipping_cost) + ' = -$' + fmt(fc2.total_fees) + ' | Net: <strong>$' + fmt(fc2.net_profit) + '</strong></div>';
    }
    $('flipc').innerHTML = fh;
  } else { $('flipc').innerHTML = '<div class="sb">No flip data available.</div>'; }

  /* --- Sold Listings --- */
  var sl = $('soldl'); sl.innerHTML = '';
  if (d.recent_sold && d.recent_sold.length) {
    for (var i = 0; i < d.recent_sold.length; i++) {
      var it = d.recent_sold[i];
      var row = _div('lr');
      row.style.cssText = 'padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:6px';
      row.onclick = (function(url){ return function(){ window.open(url, '_blank'); }; })(it.url || '#');
      row.appendChild(_span('it', it.title || ''));
      if (it.condition) { var ic = _span('ic', CL(it.condition)); ic.style.cssText = 'font-size:.68rem;color:var(--t2);background:var(--s2);padding:2px 8px;border-radius:10px'; row.appendChild(ic); }
      row.appendChild(_span('id', it.sold_date || ''));
      var ip = _span('ip', '$' + fmt(it.price)); ip.style.cssText = 'font-weight:700;font-size:.95rem'; row.appendChild(ip);
      sl.appendChild(row);
    }
  } else { sl.innerHTML = '<div class="sb" style="text-align:center;padding:40px">No sold listings found.</div>'; }

  /* --- Active Listings --- */
  var al = $('activel'); al.innerHTML = '';
  if (d.active_listings && d.active_listings.length) {
    for (var i = 0; i < d.active_listings.length; i++) {
      var it = d.active_listings[i];
      var row = _div('lr');
      row.style.cssText = 'padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:6px';
      row.onclick = (function(url){ return function(){ window.open(url, '_blank'); }; })(it.url || '#');
      row.appendChild(_span('it', it.title || ''));
      if (it.condition) { var ic = _span('ic', CL(it.condition)); ic.style.cssText = 'font-size:.68rem;color:var(--t2);background:var(--s2);padding:2px 8px;border-radius:10px'; row.appendChild(ic); }
      var ip = _span('ip', '$' + fmt(it.price)); ip.style.cssText = 'font-weight:700;font-size:.95rem'; row.appendChild(ip);
      al.appendChild(row);
    }
  } else { al.innerHTML = '<div class="sb" style="text-align:center;padding:40px">No active listings found.</div>'; }
}

/* ====== WATCHLIST ====== */
async function loadWatchlist(){
  if (!token) { $('wl').innerHTML = '<div class="sb" style="text-align:center;padding:40px">Login to use watchlist.</div>'; return; }
  try {
    var items = await fetch('/api/watchlist?token=' + token).then(function(r){ return r.json(); });
    if (!items || !items.length) { $('wl').innerHTML = '<div class="sb" style="text-align:center;padding:40px">No items watched yet.</div>'; return; }
    var wh = document.createElement('div');
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var row = _div('lr');
      row.innerHTML = '<span class="it" style="font-weight:600">' + (it.query || '') + '</span><span class="ip">$' + fmt(it.last_median) + '</span><span style="font-size:.75rem">' + ((it.price_change_pct || 0) > 0 ? '+' : '') + (it.price_change_pct || 0).toFixed(1) + '%</span>';
      var del = document.createElement('button');
      del.className = 'bt bt-g'; del.style.cssText = 'padding:3px 8px;font-size:.65rem'; del.textContent = 'x';
      del.onclick = (function(id){ return function(){ delWl(id); }; })(it.id);
      row.appendChild(del);
      wh.appendChild(row);
    }
    $('wl').innerHTML = ''; $('wl').appendChild(wh);
  } catch(e) { $('wl').innerHTML = '<div class="sb" style="text-align:center;padding:40px">Could not load watchlist.</div>'; }
}
async function delWl(id){ await fetch('/api/watchlist/' + id + '?token=' + token, {method:'DELETE'}); loadWatchlist(); }
$('wref').onclick = async function(){ await fetch('/api/watchlist/refresh-all?token=' + token, {method:'POST'}); loadWatchlist(); };

/* ====== DEAL HISTORY ====== */
async function loadDeals(){
  if (!token) { $('dh').innerHTML = '<div class="sb" style="text-align:center;padding:40px">Login to see deal history.</div>'; return; }
  try {
    var items = await fetch('/api/deal-history?token=' + token).then(function(r){ return r.json(); });
    if (!items || !items.length) { $('dh').innerHTML = '<div class="sb" style="text-align:center;padding:40px">No deals scanned yet.</div>'; return; }
    var dh = document.createElement('div');
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var row = _div('lr');
      row.innerHTML = '<span>' + (it.verdict === 'BUY' ? '\uD83D\uDD25' : '\uD83D\uDEAB') + '</span><span class="it">' + (it.item_name || '') + '</span><span class="ip">$' + fmt(it.your_price) + '\u2192$' + fmt(it.market_median) + '</span><span style="color:' + ((it.net_profit || 0) >= 0 ? 'var(--g)' : 'var(--r)') + ';font-weight:700">' + ((it.net_profit || 0) >= 0 ? '+' : '') + '$' + fmt(it.net_profit) + '</span>';
      dh.appendChild(row);
    }
    $('dh').innerHTML = ''; $('dh').appendChild(dh);
  } catch(e) { $('dh').innerHTML = '<div class="sb" style="text-align:center;padding:40px">Could not load history.</div>'; }
}

setTimeout(function(){ if ($('q').value) search(); }, 800);
