<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceSpy — eBay Price History & Market Value</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔎</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root,[data-theme="dark"]{--bg:#0f1117;--surface:#1a1d27;--surface2:#22252f;--border:#2a2d38;--text:#e8eaed;--text2:#9aa0a6;--accent:#5b8def;--accent2:#4a7de0;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--radius:12px;--radius-sm:8px}
[data-theme="light"]{--bg:#f5f5f7;--surface:#fff;--surface2:#f0f0f3;--border:#dcdce0;--text:#1c1c1e;--text2:#6c6c74;--accent:#2563eb;--accent2:#1d4ed8;--green:#059669;--red:#dc2626;--amber:#d97706;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;transition:background .3s,color .3s}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-btn:hover{border-color:var(--accent)}
.header-pill{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:18px;color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.header-pill:hover{color:var(--text);border-color:var(--text2)}
.header-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
main{max-width:1200px;margin:0 auto;padding:32px 24px 80px}
.search-section{margin-bottom:32px}
.search-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.search-card h2{font-size:1.25rem;font-weight:600;margin-bottom:6px}
.subtitle{color:var(--text2);font-size:.9rem;margin-bottom:12px}
.search-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.search-input-wrap{flex:1;min-width:200px;position:relative}
.search-input-wrap input{width:100%;padding:14px 48px 14px 18px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:1rem;transition:border-color .2s;outline:none}
.search-input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,141,239,.15)}
.search-input-wrap input::placeholder{color:#777}
.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;color:#fff;width:38px;height:38px;border-radius:7px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.search-btn:hover{background:var(--accent2)}
.search-extras{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:12px}
.extras-label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cond-select-wrap,.price-input-wrap{display:flex;flex-direction:column}
select,input[type=number]{padding:8px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.85rem;outline:none}
select:focus,input[type=number]:focus{border-color:var(--accent)}
select option{background:var(--surface);color:var(--text)}
.price-input-wrap{position:relative}
.price-input-wrap .dollar-sign{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.85rem}
.price-input-wrap input{padding-left:22px;width:110px}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;font-size:.875rem;color:var(--text2);min-height:24px}
.spinner{display:none;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spinner.show{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:var(--radius-sm);padding:14px 18px;color:var(--red);font-size:.9rem;margin-bottom:16px;display:none}
.error-msg.show{display:block}
.results{display:none}
.results.show{display:block}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.stat-card .label{font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:4px}
.stat-card .value{font-size:1.5rem;font-weight:700}
.stat-card .value.green{color:var(--green)}.stat-card .value.red{color:var(--red)}.stat-card .value.amber{color:var(--amber)}
.stat-card .sub{font-size:.75rem;color:var(--text2);margin-top:2px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.chart-card h3{margin-bottom:4px;font-size:1rem}
.chart-wrap{position:relative;width:100%;height:320px;margin-top:16px}
.chart-wrap canvas{width:100%!important;height:100%!important}
.time-pills{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.time-pill{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:18px;color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.time-pill:hover{color:var(--text);border-color:var(--text2)}
.time-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.direction-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;cursor:help;position:relative}
.direction-badge.rising{background:rgba(52,211,153,.15);color:var(--green)}
.direction-badge.falling{background:rgba(248,113,113,.15);color:var(--red)}
.direction-badge.stable{background:rgba(251,191,36,.15);color:var(--amber)}
.explain-popup{display:none;position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);width:400px;max-width:90vw;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;font-size:.85rem;line-height:1.6;color:var(--text);z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5);text-transform:none;letter-spacing:0;font-weight:400}
.explain-popup.show{display:block}
.listings-grid{display:grid;gap:8px;margin-bottom:24px}
.listing-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:background .15s;cursor:pointer}
.listing-row:hover{background:var(--surface2)}
.listing-row .item-title{flex:1;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.listing-row .item-price{font-weight:700;font-size:1rem;white-space:nowrap}
.listing-row .item-condition{font-size:.7rem;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:12px;white-space:nowrap}
.listing-row .item-date{font-size:.75rem;color:var(--text2);white-space:nowrap}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:10px 20px;background:none;border:none;color:var(--text2);font-size:.9rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.flip-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.flip-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.flip-verdict{font-size:1.3rem;font-weight:800}
.flip-score{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;font-size:1.1rem;font-weight:800;flex-shrink:0}
.flip-score.great{background:rgba(52,211,153,.15);color:var(--green);border:3px solid var(--green)}
.flip-score.decent{background:rgba(91,141,239,.15);color:var(--accent);border:3px solid var(--accent)}
.flip-score.risky{background:rgba(251,191,36,.15);color:var(--amber);border:3px solid var(--amber)}
.flip-score.avoid{background:rgba(248,113,113,.15);color:var(--red);border:3px solid var(--red)}
.flip-detail{font-size:.9rem;color:var(--text2);margin-bottom:16px;line-height:1.6}
.flip-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.flip-metric{background:var(--bg);border-radius:var(--radius-sm);padding:12px 16px}
.flip-metric .fm-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.flip-metric .fm-value{font-size:1.1rem;font-weight:700;margin-top:2px}
.flip-metric .fm-sub{font-size:.7rem;color:var(--text2)}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.your-price-badge{display:inline-block;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.bible-footer{text-align:center;padding:24px 20px 40px;color:var(--text2);font-size:.85rem;line-height:1.7;border-top:1px solid var(--border);margin-top:32px;opacity:.85}
.bible-footer .verse-text{font-style:italic;margin-bottom:4px}
.bible-footer .verse-ref{font-size:.75rem;opacity:.7}

@media(max-width:768px){main{padding:16px 12px 60px}.search-card{padding:20px}.summary-grid{grid-template-columns:1fr 1fr}.flip-metrics{grid-template-columns:1fr 1fr}.listing-row{flex-wrap:wrap;gap:8px}.listing-row .item-title{flex:100%}.chart-wrap{height:250px}}
</style>
</head>
<body>

<header>
  <span style="font-size:1.7rem">🔎</span>
  <span class="logo">PriceSpy</span>
  <div class="header-right">
    <button class="header-pill" id="navSearch" style="background:var(--accent);color:#fff;border-color:var(--accent)">🔍 Search</button>
    <button class="header-pill" id="navWatchlist">⭐ Watchlist</button>
    <button class="header-pill" id="navDeals">📋 History</button>
    <button class="theme-btn" id="themeBtn" title="Toggle light/dark">🌙</button>
  </div>
</header>

<main>
  <section class="search-section" id="searchSection">
    <div class="search-card">
      <h2>What's it worth?</h2>
      <p class="subtitle">Search any item for real eBay prices, market trends, and flipping analysis.</p>
      <div class="search-row">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder='Try "Nintendo Switch OLED" or "iPhone 15 Pro"...' autocomplete="off">
          <button class="search-btn" id="searchBtn">🔍</button>
        </div>
      </div>
      <div class="search-extras">
        <div class="cond-select-wrap">
          <div class="extras-label">Condition</div>
          <select id="conditionSelect"><option value="all">All Conditions</option></select>
        </div>
        <div class="price-input-wrap">
          <div class="extras-label">Your Buy Price ($)</div>
          <span class="dollar-sign">$</span>
          <input type="number" id="buyPriceInput" placeholder="0" step="0.01" min="0">
        </div>
        <div class="cond-select-wrap">
          <div class="extras-label">Sell On</div>
          <select id="platformSelect">
            <option value="ebay">eBay (13.25%)</option><option value="mercari">Mercari (10%)</option><option value="poshmark">Poshmark (20%)</option><option value="facebook">FB (5%)</option><option value="local">Local (0%)</option>
          </select>
        </div>
        <div class="price-input-wrap">
          <div class="extras-label">Shipping ($)</div>
          <span class="dollar-sign">$</span>
          <input type="number" id="shippingInput" placeholder="0" step="0.01" min="0">
        </div>
        <button class="btn btn-primary" id="applyFiltersBtn">Search</button>
      </div>
    </div>
  </section>

  <div class="status-bar"><span class="spinner" id="spinner"></span><span id="statusText"></span></div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="results" id="results">
    <div class="summary-grid" id="summaryGrid"></div>
    <div id="directionRow" style="margin-bottom:20px"></div>
    
    <div class="time-pills">
      <button class="time-pill" data-period="1w">1W</button>
      <button class="time-pill" data-period="1m">1M</button>
      <button class="time-pill" data-period="3m">3M</button>
      <button class="time-pill active" data-period="6m">6M</button>
      <button class="time-pill" data-period="1y">1Y</button>
      <button class="time-pill" data-period="2y">2Y</button>
      <button class="time-pill" data-period="3y">3Y</button>
      <button class="time-pill" data-period="5y">5Y</button>
      <button class="time-pill" data-period="10y">10Y</button>
    </div>

    <div class="chart-card">
      <h3 id="chartTitle">📈 Sold Price Trend</h3>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    </div>

    <div class="flip-card" id="flipCard"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="sold">🟢 Recently Sold</button>
      <button class="tab-btn" data-tab="active">🔵 Active Listings</button>
    </div>
    <div class="tab-panel active" id="tab-sold"><div class="listings-grid" id="soldListings"></div></div>
    <div class="tab-panel" id="tab-active"><div class="listings-grid" id="activeListings"></div></div>
  </div>
</main>

<div class="bible-footer" id="bibleFooter">
  <div class="verse-text" id="verseText"></div>
  <div class="verse-ref" id="verseRef"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// ═══════════════════════════════════════════
//  SAFE DOM HELPER
// ═══════════════════════════════════════════
function $(id){return document.getElementById(id)}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let chartInstance = null;
let currentData = null;
let currentPeriod = '6m';
let authToken = '';
let currentUser = null;

// ═══════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════
if($('themeBtn')){
  const saved = localStorage.getItem('pricespy-theme');
  if(saved==='light'){document.documentElement.setAttribute('data-theme','light');$('themeBtn').textContent='☀️'}
  $('themeBtn').addEventListener('click',()=>{
    const n=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',n);
    $('themeBtn').textContent=n==='light'?'☀️':'🌙';
    localStorage.setItem('pricespy-theme',n);
  });
}

// ═══════════════════════════════════════════
//  BIBLE VERSE
// ═══════════════════════════════════════════
const VERSES=[{t:'"For I know well the plans I have in mind for you, plans for your welfare, not for your disaster, plans to give you a future filled with hope."',r:'Jeremiah 29:11'},{t:'"I can do all things through him who strengthens me."',r:'Philippians 4:13'},{t:'"The Lord is my shepherd; there is nothing I shall lack."',r:'Psalm 23:1'},{t:'"Be strong and courageous. Do not be afraid, for the Lord your God goes with you."',r:'Deuteronomy 31:6'},{t:'"Come to me, all you who labor and are burdened, and I will give you rest."',r:'Matthew 11:28'},{t:'"The Lord is my light and my salvation; whom shall I fear?"',r:'Psalm 27:1'},{t:'"Rejoice in the Lord always. I say it again: rejoice!"',r:'Philippians 4:4'},{t:'"For God so loved the world that he gave his only Son."',r:'John 3:16'},{t:'"Trust in the Lord with all your heart."',r:'Proverbs 3:5'},{t:'"Seek first the kingdom of God and his righteousness."',r:'Matthew 6:33'},{t:'"The steadfast love of the Lord never ceases."',r:'Lamentations 3:22'},{t:'"Behold, I am with you always, even to the end of the age."',r:'Matthew 28:20'},{t:'"We know that all things work together for good for those who love God."',r:'Romans 8:28'},{t:'"Be still and know that I am God."',r:'Psalm 46:11'},{t:'"This is the day that the Lord has made; let us rejoice and be glad in it."',r:'Psalm 118:24'},{t:'"The Lord is near to the brokenhearted."',r:'Psalm 34:18'},{t:'"Do not be anxious about anything."',r:'Philippians 4:6'},{t:'"I am the way, and the truth, and the life."',r:'John 14:6'},{t:'"You shall love the Lord your God with all your heart."',r:'Matthew 22:37'},{t:'"Let your light shine before men."',r:'Matthew 5:16'},{t:'"Blessed are the peacemakers."',r:'Matthew 5:9'},{t:'"For where your treasure is, there also will your heart be."',r:'Matthew 6:21'},{t:'"The Lord bless you and keep you."',r:'Numbers 6:24-25'},{t:'"Let nothing disturb you, let nothing frighten you. All things pass. God never changes."',r:'St. Teresa of Ávila'}];
function setVerse(){const v=VERSES[new Date().getHours()%VERSES.length];$('verseText').textContent=v.t;$('verseRef').textContent='— '+v.r}
setVerse();setInterval(setVerse,3600000);

// ═══════════════════════════════════════════
//  CONDITION OPTIONS
// ═══════════════════════════════════════════
const COND_OPTIONS=[{v:'all',l:'All Conditions'},{v:'new (sealed)',l:'📦 New Sealed'},{v:'new',l:'🆕 New'},{v:'like new',l:'✨ Like New'},{v:'cib',l:'📋 CIB'},{v:'very good',l:'👍 Very Good'},{v:'good',l:'👌 Good'},{v:'acceptable',l:'⚠️ Acceptable'},{v:'loose',l:'💿 Loose'},{v:'untested',l:'❓ Untested'},{v:'for parts',l:'🔧 For Parts'}];
$('conditionSelect').innerHTML=COND_OPTIONS.map(c=>`<option value="${c.v}">${c.l}</option>`).join('');

function condLabel(c){const m={'new (sealed)':'📦 New Sealed','new':'🆕 New','like new':'✨ Like New','cib':'📋 CIB','very good':'👍 Very Good','good':'👌 Good','acceptable':'⚠️ Acceptable','loose':'💿 Loose','untested':'❓ Untested','for parts':'🔧 For Parts','excellent':'⭐ Excellent','fair':'⚠️ Fair','poor':'🔧 Poor'};return m[c]||c||'Unknown'}
function fmt(n){return(n||0).toFixed?Number(n).toFixed(2):'0.00'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
function setLoading(on){$('spinner').classList.toggle('show',on);$('statusText').textContent=on?'🔎 Searching for real-time pricing data...':''}
function showError(m){$('errorMsg').textContent=m;$('errorMsg').classList.add('show')}
function hideError(){$('errorMsg').classList.remove('show')}

async function doSearch(overrideQuery){
  const q = overrideQuery || $('searchInput').value.trim();
  if(!q)return;
  $('searchInput').value = q;
  setLoading(true);hideError();$('results').classList.remove('show');
  
  const cond = $('conditionSelect').value||'all';
  const bp = parseFloat($('buyPriceInput').value)||0;
  const plat = $('platformSelect').value||'ebay';
  const ship = parseFloat($('shippingInput').value)||0;
  
  let url = `/api/search?q=${encodeURIComponent(q)}&period=${currentPeriod}&condition=${encodeURIComponent(cond)}`;
  if(bp>0) url += `&buy_price=${bp.toFixed(2)}`;
  url += `&platform=${encodeURIComponent(plat)}`;
  if(ship>0) url += `&shipping=${ship.toFixed(2)}`;
  
  try{
    const resp = await fetch(url);
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error||'Search failed');
    if(!data.sold_summary||data.sold_summary.count===0){
      showError(`No results for "${q}". Try different keywords.`);setLoading(false);return;
    }
    currentData = data;
    renderAll(data);
    $('results').classList.add('show');
    $('results').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(err){
    showError(err.message||'Something went wrong. Please try again.');
  }finally{setLoading(false)}
}

$('searchBtn').addEventListener('click',()=>doSearch());
$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
$('applyFiltersBtn').addEventListener('click',()=>doSearch());

// ═══════════════════════════════════════════
//  TIME PILLS
// ═══════════════════════════════════════════
document.querySelectorAll('.time-pill').forEach(p=>{
  p.addEventListener('click',()=>{
    currentPeriod=p.dataset.period;
    document.querySelectorAll('.time-pill').forEach(pp=>pp.classList.toggle('active',pp.dataset.period===currentPeriod));
    doSearch();
  });
});

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderAll(d){
  renderSummary(d);
  renderDirection(d);
  renderChart(d.trend,d);
  renderFlip(d);
  renderListings(d);
}

function renderSummary(d){
  const s=d.sold_summary,a=d.active_summary,f=d.flip_analysis||{};
  const p=f.potential_profit||0,pct=f.potential_profit_pct||0;
  $('summaryGrid').innerHTML=`
    <div class="stat-card"><div class="label">💰 Median Sold</div><div class="value">$${fmt(s.median)}</div><div class="sub">${s.count} sold listings</div></div>
    <div class="stat-card"><div class="label">📊 Range</div><div class="value">$${fmt(s.low)} – $${fmt(s.high)}</div><div class="sub">Avg: $${fmt(s.mean)}</div></div>
    <div class="stat-card"><div class="label">🏷️ Active Market</div><div class="value ${a.median && s.median && a.median < s.median ? 'green' : (a.median > s.median * 1.05 ? 'amber' : '')}">$${a.median?fmt(a.median):'—'}</div><div class="sub">${a.count} active</div></div>
    <div class="stat-card"><div class="label">📈 Trend</div><div class="value ${d.direction==='rising'?'green':(d.direction==='falling'?'red':'amber')}">${d.direction==='rising'?'↑ Rising':(d.direction==='falling'?'↓ Falling':'→ Stable')}</div><div class="sub">${d.period.toUpperCase()}</div></div>
    <div class="stat-card"><div class="label">🔄 Flip Score</div><div class="value ${(f.score||0)>=70?'green':((f.score||0)>=50?'':((f.score||0)>=30?'amber':'red'))}">${f.score||'—'}/100</div><div class="sub">${f.verdict||'N/A'}</div></div>
    <div class="stat-card"><div class="label">💵 Net Profit</div><div class="value ${p>=0?'green':'red'}">${p>=0?'+':''}$${fmt(p)}</div><div class="sub">${pct>=0?'+':''}${pct}%${f.user_buy_price_used?' <span class="your-price-badge">your price</span>':''}</div></div>`;
}

function renderDirection(d){
  const dir=d.direction,src=d.data_source||'Smart Estimate';
  const expl=(d.flip_analysis||{}).market_explanation||'Not enough data.';
  $('directionRow').innerHTML=`
    <span class="direction-badge ${dir}" id="explainTrigger">
      ${dir==='rising'?'📈 Market Rising':(dir==='falling'?'📉 Market Falling':'📊 Market Stable')}
      <span style="font-size:.7rem;opacity:.7">ⓘ</span>
      <div class="explain-popup" id="explainPopup">${esc(expl)}</div>
    </span>
    <span style="font-size:.75rem;color:var(--text2);margin-left:10px">Data: <strong style="color:${src.includes('Estimate')?'var(--amber)':'var(--green)'}">${esc(src)}</strong></span>`;
  setTimeout(()=>{
    const t=$('explainTrigger'),p=$('explainPopup');
    if(t&&p){t.addEventListener('click',e=>{e.stopPropagation();p.classList.toggle('show')});document.addEventListener('click',()=>p.classList.remove('show'))}
  },0);
}

function renderChart(trend,d){
  if(chartInstance){chartInstance.destroy();chartInstance=null}
  if(!trend||trend.length<2)return;
  $('chartTitle').textContent=`📈 Sold Price Trend${d.active_filter_condition&&d.active_filter_condition!=='all'?' — '+condLabel(d.active_filter_condition):''}`;
  const ctx=$('priceChart').getContext('2d');
  chartInstance=new Chart(ctx,{type:'line',data:{labels:trend.map(t=>t.date),datasets:[
    {label:'High',data:trend.map(t=>t.high),borderColor:'rgba(248,113,113,.4)',backgroundColor:'rgba(248,113,113,.05)',borderWidth:1,pointRadius:0,fill:'+1',tension:.3},
    {label:'Median',data:trend.map(t=>t.median),borderColor:'#5b8def',backgroundColor:'rgba(91,141,239,.08)',borderWidth:2.5,pointRadius:0,fill:false,tension:.3},
    {label:'Low',data:trend.map(t=>t.low),borderColor:'rgba(52,211,153,.4)',backgroundColor:'rgba(52,211,153,.05)',borderWidth:1,pointRadius:0,fill:false,tension:.3}]},
    options:{responsive:!0,maintainAspectRatio:!1,interaction:{intersect:!1,mode:'index'},plugins:{legend:{position:'top',labels:{color:'#9aa0a6',usePointStyle:!0,padding:20,font:{size:12}}},tooltip:{backgroundColor:'#1a1d27',titleColor:'#e8eaed',bodyColor:'#9aa0a6',borderColor:'#2a2d38',borderWidth:1,callbacks:{label:ctx=>` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`}}},scales:{x:{ticks:{color:'#888',maxTicksLimit:8,font:{size:10}},grid:{color:'rgba(128,128,128,.15)'}},y:{ticks:{color:'#888',font:{size:10},callback:v=>'$'+v.toFixed(0)},grid:{color:'rgba(128,128,128,.15)'}}}}});
}

function renderFlip(d){
  const f=d.flip_analysis||{};if(!f.verdict){$('flipCard').innerHTML='';return}
  const cls=f.score>=70?'great':(f.score>=50?'decent':(f.score>=30?'risky':'avoid'));
  const p=f.potential_profit||0;const fc=f.fee_calculation||{};
  $('flipCard').innerHTML=`
    <div class="flip-header"><div class="flip-score ${cls}">${f.score}</div><div><div class="flip-verdict">${f.verdict}</div><div style="font-size:.85rem;color:var(--text2)">Flip Score${f.user_buy_price_used?' <span class="your-price-badge">your price</span>':''}</div></div></div>
    <div class="flip-detail">${esc(f.verdict_detail||'')}</div>
    <div class="flip-metrics">
      <div class="flip-metric"><div class="fm-label">💵 Net Profit</div><div class="fm-value" style="color:${p>=0?'var(--green)':'var(--red)'}">${p>=0?'+':''}$${fmt(p)}</div><div class="fm-sub">${fmt(f.potential_profit_pct||0)}%</div></div>
      <div class="flip-metric"><div class="fm-label">📊 Buy → Sell</div><div class="fm-value">$${fmt(f.potential_buy_price||0)} → $${fmt(f.potential_sell_price||0)}</div><div class="fm-sub">Market low → median</div></div>
      <div class="flip-metric"><div class="fm-label">🔄 Sell-Through</div><div class="fm-value">${fmt(f.sell_through_rate||0)}%</div><div class="fm-sub">Listings that sell</div></div>
      <div class="flip-metric"><div class="fm-label">⚡ Velocity</div><div class="fm-value">${fmt(f.velocity_per_day||0)}/day</div><div class="fm-sub">${f.velocity_label||'N/A'}</div></div>
      <div class="flip-metric"><div class="fm-label">🏪 Competition</div><div class="fm-value ${(f.competition_level||0)<30?'green':((f.competition_level||0)<60?'':'red')}">${f.competition_level||0}%</div><div class="fm-sub">${(f.competition_level||0)<30?'Low':((f.competition_level||0)<60?'Moderate':'High')}</div></div>
      <div class="flip-metric"><div class="fm-label">⚠️ Risk</div><div class="fm-value ${(f.risk_level||'')==='Low'?'green':((f.risk_level||'')==='High'?'red':'amber')}">${f.risk_level||'N/A'}</div><div class="fm-sub">Vol: ${fmt(f.volatility||0)}%</div></div>
    </div>
    ${fc.platform?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:.8rem;color:var(--text2)">🧾 Fees on ${esc(fc.platform)}: Platform $${fmt(fc.platform_fee)} + Payment $${fmt(fc.payment_fee)} + Ship $${fmt(fc.shipping_cost)} = <strong style="color:var(--red)">-$${fmt(fc.total_fees)}</strong> | Gross $${fmt(fc.gross_profit)} → Net <strong style="color:${fc.net_profit>=0?'var(--green)':'var(--red)'}">$${fmt(fc.net_profit)}</strong></div>`:''}`;
}

function renderListings(d){
  $('soldListings').innerHTML=d.recent_sold&&d.recent_sold.length?d.recent_sold.map(it=>`<div class="listing-row" onclick="window.open('${esc(it.url||'#')}','_blank')"><span class="item-title">${esc(it.title||'')}</span>${it.condition?`<span class="item-condition">${condLabel(it.condition)}</span>`:''}<span class="item-date">${esc(it.sold_date||'')}</span><span class="item-price">$${fmt(it.price)}</span></div>`).join(''):'<div class="empty-state"><p>No sold listings found.</p></div>';
  $('activeListings').innerHTML=d.active_listings&&d.active_listings.length?d.active_listings.map(it=>`<div class="listing-row" onclick="window.open('${esc(it.url||'#')}','_blank')"><span class="item-title">${esc(it.title||'')}</span>${it.condition?`<span class="item-condition">${condLabel(it.condition)}</span>`:''}<span class="item-price">$${fmt(it.price)}</span></div>`).join(''):'<div class="empty-state"><p>No active listings found.</p></div>';
}

// ═══════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');const t=document.getElementById('tab-'+btn.dataset.tab);if(t)t.classList.add('active')})});

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
$('navSearch').addEventListener('click',()=>{$('searchSection').style.display='';$('results').style.display=currentData?'block':'none';$('watchlistPage')&&($('watchlistPage').style.display='none');$('dealsPage')&&($('dealsPage').style.display='none')});

// ═══════════════════════════════════════════
//  AUTH (localStorage)
// ═══════════════════════════════════════════
try{const u=localStorage.getItem('pricespy_user');if(u)currentUser=JSON.parse(u)}catch(e){}
try{authToken=localStorage.getItem('pricespy_token')||''}catch(e){}

// ═══════════════════════════════════════════
//  STARTUP
// ═══════════════════════════════════════════
console.log('✅ PriceSpy loaded — ready to search');
setTimeout(()=>doSearch('Nintendo Switch OLED'),1000);
</script>
</body>
